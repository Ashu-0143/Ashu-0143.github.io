<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strict Vault</title>
    <link rel="stylesheet" href="pl.css">
</head>
<body>

<div class="glass-container">

    <!-- MENU -->
    <div id="menu" class="section">
        <h1>Vault Menu</h1>

        <button class="menu-btn" onclick="openInputUI()">➕ Get New Password</button>
        <button class="menu-btn" onclick="showSection('saved')">📂 Open Saved Passwords</button>
        <button class="menu-btn secondary" onclick="location.href='../index.html'">🏠 Home</button>

        <!-- ✅ NEW INPUT UI -->
        <div id="inputUI" style="display:none; margin-top:20px;">

            <input id="labelInput" placeholder="Purpose" class="menu-btn" />

            <div style="text-align:left; margin-top:10px;">
                <b>Select Days:</b><br>
                <label><input type="checkbox" value="0"> Sun</label>
                <label><input type="checkbox" value="1"> Mon</label>
                <label><input type="checkbox" value="2"> Tue</label>
                <label><input type="checkbox" value="3"> Wed</label>
                <label><input type="checkbox" value="4"> Thu</label>
                <label><input type="checkbox" value="5"> Fri</label>
                <label><input type="checkbox" value="6"> Sat</label>
            </div>

            <div style="margin-top:10px;">
                <b>Select Time:</b><br>
                <input type="time" id="timeInput" class="menu-btn">
            </div>

            <button class="menu-btn" onclick="createLock()">Create</button>
        </div>
    </div>

    <!-- SAVED -->
    <div id="saved" class="section" style="display:none;">
        <h1>Your Vault</h1>
        <div id="vaultList"></div>
        <button class="menu-btn" onclick="showSection('menu')">⬅️ Back</button>
    </div>

</div>

<script type="module" src="pl.js"></script>
</body>
</html>
