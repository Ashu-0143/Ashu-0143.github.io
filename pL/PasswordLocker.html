<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strict Vault</title>
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="pl.css">
</head>
<body>
    <div class="glass-container">
        <!-- Main Menu -->
        <div id="menu" class="section">
            <h1>Vault Menu</h1>
            <button class="menu-btn" onclick="generateNewLock()">➕ Get New Password</button>
            <button class="menu-btn" onclick="showSection('saved')">📂 Open Saved Passwords</button>
            <button class="menu-btn secondary" onclick="location.href='../index.html'">🏠 Home</button>
        </div>

        <!-- Saved Passwords Section -->
        <div id="saved" class="section" style="display:none;">
            <h1>Your Vault</h1>
            <div id="vaultList"></div>
            <button class="menu-btn" onclick="showSection('menu')">⬅️ Back</button>
        </div>
    </div>

    <script type="module" src="pl.js"></script>
</body>
</html>
