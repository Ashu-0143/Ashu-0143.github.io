    <!-- Bootstrap -->

    <title>Ashu</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ✅ FIREBASE & MAIN SCRIPT -->
    <script type="module" src="script.js"></script>

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark ">
  <div class="container-fluid">
    <a class="navbar-brand headingTitle" onclick="login()" href="#">Ashu</a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end text-bg-dark" id="offcanvasDarkNavbar">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title"><a href="tailor/index.html" style="text-decoration: none;color: inherit;">Quick</a> Links</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="games.html">Games</a></li>
          <li class="nav-item"><a class="nav-link" href="friends.html">Friends</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<center>
  <div class="homeIntro">
    <h1>
      Content will be added soon ... Visit our 
      <a href="games.html" class="highlight">Games</a> and 
      <a href="friends.html" class="highlight">Friends</a>.
    </h1>
  </div>
</center>

<div class="colors">
  <h1 class="decorLine" style="color: rgb(0, 255, 0);">----------</h1>
</div>

<!-- ✅ Chat Section -->
<div id="chat-container" style="display:none;">
  <div id="chat-box"></div>
  <div class="submitPack" style="display:flex; margin-top:10px; gap: 5px;">
    <input id="message" class="form-control" placeholder="Type message...">
    <button id="guessButton" onclick="sendMessage()" class="btn">Send</button>
  </div>
</div>

<script>
  let bodyClicks = 0;
  let clickTimer;

  // Handles the 4-click shortcut
  $(document).on('click', function(e) {
    // Ignore clicks on buttons, links, or inputs so regular use doesn't trigger it
    if (!$(e.target).is('button, a, input, .navbar-toggler-icon, .offcanvas, #message, #guessButton')) {
      bodyClicks++;
      clearTimeout(clickTimer);

      if (bodyClicks === 4) {
        // Redirect to your specific Password Locker page
        window.location.href = 'pL/PasswordLocker.html'; 
      }

      // Reset count if user stops clicking for 1.5 seconds
      clickTimer = setTimeout(() => {
        bodyClicks = 0;
      }, 1500);
    }
  });

  // PWA Registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log("Ashu PWA Registered"))
      .catch((err) => console.log("SW Register Error:", err));
  }
</script>

</body>
</html>
