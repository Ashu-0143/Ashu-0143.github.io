<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicons/favicon5.ico" type="image/x-icon">

    <!-- ✅ jQuery (FIXED) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- ✅ Bootstrap (FIXED) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <title>Ashu</title>

    <!-- ✅ FIREBASE SCRIPT -->
    <script type="module" src="script.js"></script>

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="index.css">

    <style>
        .sparkle {
            position: absolute;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.8) 0%, rgba(0, 255, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            animation: sparkle-fade 0.6s ease-out forwards;
        }

        @keyframes sparkle-fade {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark ">
  <div class="container-fluid">
    <a class="navbar-brand headingTitle" onclick="login()" href="javascript:void(0)">Ashu</a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end text-bg-dark" id="offcanvasDarkNavbar">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">
          <a href="tailor/index.html" style="text-decoration: none;color: inherit;">Quick</a> Links
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>

      <div class="offcanvas-body">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="games.html">Games</a></li>
          <li class="nav-item"><a class="nav-link" href="friends.html">Friends</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<center>
  <div class="homeIntro">
    <h1>
      Content will be added soon ... Visit our 
      <a href="games.html" class="highlight">Games</a> and 
      <a href="friends.html" class="highlight">Friends</a>.
    </h1>
  </div>
</center>

<div class="colors">
  <h1 class="decorLine" style="color: rgb(0, 255, 0);">----------</h1>
</div>

<!-- ✅ Chat Section -->
<div id="chat-container" style="display:none;">
  <div id="chat-box"></div>
  <div class="submitPack" style="display:flex; margin-top:10px; gap: 5px;">
    <input id="message" class="form-control" placeholder="Type message...">
    <button id="guessButton" onclick="sendMessage()" class="btn btn-success">Send</button>
  </div>
</div>

<script>
  let bodyClicks = 0;
  let clickTimer;

  $(document).on('click', function(e) {
    if (!$(e.target).is('button, a, input, .navbar-toggler-icon, .offcanvas, #message, #guessButton, .btn-close')) {
      bodyClicks++;
      createSparkle(e.pageX, e.pageY, bodyClicks);
      clearTimeout(clickTimer);

      if (bodyClicks === 4) {
        setTimeout(() => {
            window.location.href = 'pL/PasswordLocker.html';
        }, 200);
      }

      clickTimer = setTimeout(() => {
        bodyClicks = 0;
      }, 1500);
    }
  });

  function createSparkle(x, y, count) {
    const size = count * 25;
    const sparkle = $('<div class="sparkle"></div>').css({
      top: y - (size / 2),
      left: x - (size / 2),
      width: size + 'px',
      height: size + 'px',
      filter: `brightness(${1 + (count * 0.5)})`
    });

    $('body').append(sparkle);
    setTimeout(() => { sparkle.remove(); }, 600);
  }

  // ✅ Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log("Ashu PWA Registered"))
      .catch((err) => console.log("SW Register Error:", err));
  }
</script>

</body>
</html>
