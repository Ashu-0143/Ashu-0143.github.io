<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ FIXED PATH -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<link rel="icon" href="images/tailor.png">
<link rel="apple-touch-icon" href="images/tailor.png">
<title>Work App - Summary</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:15px; }
h2 { text-align:center; }

.filters { display:flex; gap:10px; margin-bottom:15px; }
.filters button {
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
}

.today { background:#007bff; }
.yest { background:#6c757d; }
.month { background:#28a745; }

.totalCard {
    background:#4facfe;
    color:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    font-size:32px;
}

.barWrap { margin-top:20px; }

.barRow { margin:10px 0; cursor:pointer; }

.bar {
    height:25px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.fill {
    height:100%;
    background:#28a745;
    color:white;
    text-align:right;
    padding-right:10px;
}

.back {
    background:#444;
    color:white;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">⬅ Back</button>

<h2>📊 Summary</h2>

<div class="filters">
    <button class="today" onclick="loadData('today')">Today</button>
    <button class="yest" onclick="loadData('yesterday')">Yesterday</button>
    <button class="month" onclick="loadData('month')">Month</button>
</div>

<div class="totalCard" id="total">₹0</div>

<div class="barWrap" id="bars"></div>

<!-- ✅ FIXED FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCaRF_Kpsjlpy4PbhB5wrEKjnTk34n9Me4",
  authDomain: "ashu-0143.firebaseapp.com",
  projectId: "ashu-0143"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.goBack = () => location.href = "index.html";

// ✅ AUTH
onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== "ZcScdiPVf0VnjHsHZsRTrcMy8Y02") {
    window.location.href = "index.html";
  } else {
    loadData("today");
  }
});

// 🔊 VOICE FIX (IMPORTANT)
window.speak = function(text) {
  // must be triggered after user interaction
  if (!window.speechSynthesis) return;

  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "en-IN";

  speechSynthesis.cancel(); // stop previous
  speechSynthesis.speak(msg);
};

// 📅 HELPERS
function getDate(offset=0){
  let d = new Date();
  d.setDate(d.getDate()+offset);
  return d.toISOString().split("T")[0];
}

function formatDate(d){
  return new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short"});
}

// 📊 LOAD DATA
window.loadData = async function(type){
  const snap = await getDocs(collection(db,"daily"));

  let map = {};
  snap.forEach(doc=>{
    let d = doc.data();
    map[d.date] = d.total || 0;
  });

  let days=[];
  let today=getDate();
  let yest=getDate(-1);

  if(type==="today"){
    days=[{date:today,total:map[today]||0}];
  }
  else if(type==="yesterday"){
    days=[{date:yest,total:map[yest]||0}];
  }
  else{
    let now=new Date();
    let y=now.getFullYear();
    let m=now.getMonth();
    let last=new Date(y,m+1,0).getDate();

    for(let i=1;i<=last;i++){
      let d=new Date(y,m,i).toISOString().split("T")[0];
      if(map[d]) days.push({date:d,total:map[d]});
    }
  }

  // UI
  let total=days.reduce((a,b)=>a+b.total,0);
  document.getElementById("total").innerText="₹"+total;

  let max=Math.max(...days.map(d=>d.total),1);

  let html="";
  days.forEach(d=>{
    let w=(d.total/max)*100;

    html+=`
    <div class="barRow" onclick="speak('${formatDate(d.date)} ${d.total} rupees')">
      <div>${formatDate(d.date)}</div>
      <div class="bar">
        <div class="fill" style="width:${w}%">
          ${d.total>0?'₹'+d.total:''}
        </div>
      </div>
    </div>`;
  });

  document.getElementById("bars").innerHTML =
    html || "<p style='text-align:center'>No data</p>";
};
</script>

</body>
</html>
