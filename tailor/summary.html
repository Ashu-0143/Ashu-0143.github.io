<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/tailor/manifest.json">
<meta name="theme-color" content="#007bff">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary</title>

<style>
body {
    font-family: Arial;
    background:#f4f6f9;
    padding:15px;
}

h2 { text-align:center; }

/* FILTER BUTTONS */
.filters {
    display:flex;
    gap:10px;
}

.filters button {
    flex:1;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:10px;
    color:white;
}

.today { background:#007bff; }
.yest { background:#6c757d; }
.month { background:#28a745; }

/* TOTAL CARD */
.totalCard {
    margin-top:15px;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:32px;
}

/* BAR */
.barWrap { margin-top:20px; }

.barRow { margin:12px 0; }

.bar {
    height:28px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

.fill {
    height:100%;
    background:linear-gradient(90deg,#28a745,#00c851);
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding-right:8px;
    color:white;
    font-weight:bold;
}

/* BACK */
.back {
    background:#444;
    color:white;
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">⬅ Back</button>

<h2>📊 Summary</h2>

<div class="filters">
    <button class="today" onclick="loadData('today')">Today</button>
    <button class="yest" onclick="loadData('yesterday')">Yesterday</button>
    <button class="month" onclick="loadData('month')">Month</button>
</div>

<div class="totalCard" id="total">₹0</div>

<div class="barWrap" id="bars"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCaRF_Kpsjlpy4PbhB5wrEKjnTk34n9Me4",
  authDomain: "ashu-0143.firebaseapp.com",
  projectId: "ashu-0143"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.goBack = ()=> location.href="index.html";

// 🔊 SPEAK
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-IN";
    speechSynthesis.speak(msg);
}

// 📅 helpers
function formatDate(date){
    return new Date(date).toLocaleDateString('en-IN', {
        day:'numeric',
        month:'short'
    });
}

function getDate(offset=0){
    let d = new Date();
    d.setDate(d.getDate()+offset);
    return d.toISOString().split("T")[0];
}

// 📊 LOAD
window.loadData = async function(type){
    let snap = await getDocs(collection(db,"daily"));

    let dataMap = {};

    snap.forEach(doc=>{
        let d = doc.data();
        dataMap[d.date] = d.total || 0;
    });

    let today = getDate();
    let yesterday = getDate(-1);
    let month = new Date().getMonth();

    let days = [];

    if(type==='today'){
        days = [{date:today, total:dataMap[today]||0}];
    }
    else if(type==='yesterday'){
        days = [{date:yesterday, total:dataMap[yesterday]||0}];
    }
    else {
        // FULL MONTH (no missing)
        let d = new Date();
        let year = d.getFullYear();
        let m = d.getMonth();

        let lastDay = new Date(year, m+1, 0).getDate();

        for(let i=1;i<=lastDay;i++){
            let date = new Date(year,m,i).toISOString().split("T")[0];
            days.push({
                date,
                total: dataMap[date] || 0
            });
        }
    }

    // TOTAL
    let total = days.reduce((a,b)=>a+b.total,0);
    document.getElementById("total").innerText = "₹" + total;

    // MAX
    let max = Math.max(...days.map(d=>d.total),1);

    // BARS
    let html = "";

    days.forEach(d=>{
        let width = (d.total / max) * 100;

        html += `
        <div class="barRow" onclick="speak('${formatDate(d.date)} - ${d.total} rupees')">
            <div class="bar">
                <div class="fill" style="width:${width}%">
                    ${d.total > 0 ? '₹'+d.total : ''}
                </div>
            </div>
        </div>`;
    });

    document.getElementById("bars").innerHTML = html;
}

// default
loadData('today');
</script>

</body>
</html>
