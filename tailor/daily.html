<script type="module">
// ✅ Fixed the import URLs - pointing to specific JS files
import { initializeApp } from "https://gstatic.com";
import { getFirestore, doc, getDoc, setDoc } from "https://gstatic.com";
import { getAuth, onAuthStateChanged } from "https://gstatic.com";

const firebaseConfig = {
  apiKey: "AIzaSyCaRF_Kpsjlpy4PbhB5wrEKjnTk34n9Me4",
  authDomain: "ashu-0143.firebaseapp.com",
  projectId: "ashu-0143"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let list = [];
let changed = false;
const today = new Date().toISOString().split("T")[0];

// ✅ AUTH PROTECTION
onAuthStateChanged(auth, (user) => {
  if (user && user.uid === "ZcScdiPVf0VnjHsHZsRTrcMy8Y02") {
    load(); 
  } else {
    setTimeout(() => {
        if (!auth.currentUser) window.location.href = "index.html";
    }, 2000);
  }
});

async function load(){
    try {
        const snap = await getDoc(doc(db, "daily", today));
        if(snap.exists()){
            list = snap.data().list || [];
        }
        render();
    } catch (err) {
        console.error("Load failed:", err);
    }
}

// ✅ GLOBAL FUNCTIONS (Attached to window so HTML buttons can see them)
window.add = (val) => {
    list.push(val);
    changed = true;
    render();
};

window.customAmount = () => {
    let val = prompt("Enter Custom Amount:");
    if(!val) return;
    val = parseInt(val.replace(/[^0-9]/g,''));
    if(val) {
        list.push(val);
        changed = true;
        render();
    }
};

window.undo = () => {
    list.pop();
    changed = true;
    render();
};

window.removeItem = (i) => {
    list.splice(i, 1);
    changed = true;
    render();
};

window.save = async () => {
    try {
        await setDoc(doc(db, "daily", today), {
            date: today,
            list: list,
            total: list.reduce((a, b) => a + b, 0)
        });
        changed = false;
        alert("Cloud Sync Successful!");
    } catch (e) {
        alert("Save failed: Check connection or permissions");
    }
};

window.goBack = () => {
    if(changed) {
        document.getElementById("popup").style.display = "block";
    } else {
        window.location.href = "index.html"; 
    }
};

window.saveAndExit = async () => {
    await window.save();
    window.location.href = "index.html";
};

window.discard = () => {
    window.location.href = "index.html";
};

function format(n) { return n.toString().padStart(6, ' '); }

function render() {
    const calcBox = document.getElementById("calc");
    let total = 0;
    let html = "";
    list.forEach((n, i) => {
        total += n;
        html += `<div class="item" title="Double-click to remove" ondblclick="removeItem(${i})">
                    ${format(i === 0 ? n : "+" + n)}
                 </div>`;
    });
    if(list.length > 0) {
        html += `<div class="line"></div>`;
        html += `<b>TOTAL ${format(total)}</b>`;
    } else {
        html = "<small style='color:#ccc'>No work added today</small>";
    }
    calcBox.innerHTML = html;
}
</script>
