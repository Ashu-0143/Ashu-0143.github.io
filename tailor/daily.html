<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<link rel="icon" href="images/tailor.png">
<link rel="apple-touch-icon" href="images/tailor.png">
<title>Daily Work Ledger</title>

<style>
    :root { --primary: #667eea; --bg: #f8f9fa; --text: #2d3436; }
    body { 
        font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; 
        display: flex; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box;
    }
    .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; }
    
    .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .back { background: white; color: #636e72; padding: 10px 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h2 { margin: 0; font-size: 20px; color: var(--text); }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 15px; }
    .btn {
        background: white; border-radius: 20px; padding: 12px; text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .btn img { width: 100%; height: 80px; object-fit: contain; border-radius: 10px; margin-bottom: 8px; }
    .btn p { margin: 0; font-size: 14px; font-weight: 600; color: #444; }

    .custom { background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    .calc {
        background: white; padding: 25px; border-radius: 24px; font-size: 20px; 
        text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 15px;
    }
    .item { padding: 5px 0; color: #636e72; cursor: pointer; font-size: 16px; }
    .item:hover { color: #f5576c; text-decoration: line-through; }
    .line { border-top: 1px solid #eee; margin: 10px 0; }

    .footer-actions { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
    .undo { background: #636e72; color: white; padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
    .saveBtn { background: linear-gradient(135deg, #2af598 0%, #009efd 100%); color: white; padding: 15px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }

    .popup { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; background: white; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); border-radius: 24px; text-align: center; z-index: 100; }
    .popup button { width: 45%; padding: 12px; border-radius: 12px; border: none; margin: 5px; font-weight: bold; cursor: pointer; }
    .save { background: #28a745; color: white; }
    .discard { background: #636e72; color: white; }
</style>
</head>

<body>

<div class="container">
    <div class="nav-header">
        <button class="back" onclick="goBack()">⬅ Back</button>
        <h2>Daily Ledger</h2>
        <div style="width:70px"></div>
    </div>

    <div class="grid">
        <div class="btn" onclick="add(250)"><img src="images/blouse.jpg"><p>Blouse ₹250</p></div>
        <div class="btn" onclick="add(500)"><img src="images/frock.jpeg"><p>Frock ₹500</p></div>
        <div class="btn" onclick="add(300)"><img src="images/modelBlouse.jpeg"><p>Model ₹300</p></div>
        <div class="btn" onclick="add(30)"><img src="images/nighty.jpeg"><p>Nighty ₹30</p></div>
        <div class="btn" onclick="add(50)"><img src="images/saree.jpg"><p>Saree ₹50</p></div>
        <div class="btn custom" onclick="customAmount()">➕ Custom</div>
    </div>

    <div class="calc" id="calc">No work logged</div>

    <div class="footer-actions">
        <button class="undo" onclick="undo()">Undo</button>
        <button class="saveBtn" onclick="save()">Save Today</button>
    </div>
</div>

<div id="popup" class="popup" style="display:none;">
    <p><b>Unsaved changes!</b></p>
    <button class="save" onclick="saveAndExit()">Save</button>
    <button class="discard" onclick="discard()">Discard</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCaRF_Kpsjlpy4PbhB5wrEKjnTk34n9Me4",
  authDomain: "ashu-0143.firebaseapp.com",
  projectId: "ashu-0143"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let list = [];
let changed = false;
let currentUid = null;
const today = new Date().toISOString().split("T")[0];

onAuthStateChanged(auth, (user) => {
  if (user) {
      currentUid = user.uid;
      load();
  } else {
      window.location.href = "index.html";
  }
});

// ✅ KEY CHANGE: Data is now stored under the user's specific UID
async function load(){
    const snap = await getDoc(doc(db, "users", currentUid, "daily", today));
    if(snap.exists()) list = snap.data().list || [];
    render();
}

window.add = (val) => { list.push(val); changed = true; render(); };

window.customAmount = () => {
    let val = prompt("Enter amount:");
    if(!val) return;
    val = parseInt(val);
    if(val) { list.push(val); changed = true; render(); }
};

window.undo = () => { list.pop(); changed = true; render(); };

window.removeItem = (i) => { list.splice(i,1); changed = true; render(); };

window.save = async () => {
    // ✅ SAVES TO USER SPECIFIC PATH
    await setDoc(doc(db, "users", currentUid, "daily", today), {
        date: today,
        list,
        total: list.reduce((a,b)=>a+b,0)
    });
    changed = false;
    alert("Saved successfully!");
};

window.goBack = () => {
    if(changed) document.getElementById("popup").style.display="block";
    else window.location.href="index.html";
};

window.saveAndExit = async () => { await save(); window.location.href="index.html"; };
window.discard = () => { window.location.href="index.html"; };

function render(){
    let total = list.reduce((a,b)=>a+b,0);
    let html = list.map((n,i)=>`<div class="item" ondblclick="removeItem(${i})">${n}</div>`).join('');
    document.getElementById("calc").innerHTML =
        list.length ? html + `<div class="line"></div><b style="color:var(--primary)">₹${total}</b>` : "No work logged";
}
</script>

</body>
</html>
