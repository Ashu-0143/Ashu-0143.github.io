<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers</title>
<link rel="stylesheet" href="style.css">

<style>
.entry { padding:8px; margin:5px 0; border-radius:8px; }
.add { background:#ffdddd; }
.pay { background:#ddffdd; }
</style>
</head>

<body>

<button onclick="go('index.html')">⬅ Back</button>

<h2>Customers</h2>

<input id="phone" placeholder="Enter Phone" oninput="loadCustomer()">

<div id="custArea"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "ashu-0143.firebaseapp.com",
  projectId: "ashu-0143"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.go = p => location.href=p;

function getLocal(){
    return JSON.parse(localStorage.getItem("customers")||"{}");
}
function saveLocal(d){
    localStorage.setItem("customers",JSON.stringify(d));
}

window.loadCustomer = async function(){
    let phone = phoneInput.value;
    if(phone.length!==10) return custArea.innerHTML="";

    let local = getLocal();
    let data = local[phone];

    if(!data){
        let snap = await getDoc(doc(db,"customers",phone));
        if(snap.exists()) data = snap.data();
    }

    if(!data){
        let name = prompt("Name?");
        data = { name, history: [] };
    }

    local[phone]=data;
    saveLocal(local);
    await setDoc(doc(db,"customers",phone),data);

    render(phone,data);
}

function render(phone,data){
    let total=0, html="";

    data.history.forEach(h=>{
        total+=h.amount;
        html+=`
        <div class="entry ${h.amount>0?'add':'pay'}">
            ${h.amount>0?'+':'-'}₹${Math.abs(h.amount)} 
            <br><small>${h.note||''} | ${h.date||''}</small>
        </div>`;
    });

    custArea.innerHTML=`
        <h3>${data.name}</h3>
        <h2>Total: ₹${total}</h2>

        ${html}

        <button onclick="add('${phone}',1)">➕ Add Work</button>
        <button onclick="add('${phone}',-1)">💰 Payment</button>
    `;
}

window.add = async function(phone,type){
    let amt = parseInt(prompt("Amount?"));
    let note = prompt("Note (blouse/frock/etc)?");

    if(!amt) return;

    let local=getLocal();
    let d=local[phone];

    d.history.push({
        amount:type*amt,
        note,
        date:new Date().toLocaleDateString()
    });

    saveLocal(local);
    await setDoc(doc(db,"customers",phone),d);

    render(phone,d);
}
</script>

</body>
</html>
