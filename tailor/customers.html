<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ FIXED PATHS -->
<link rel="manifest" href="manifest.json">
<link rel="shortcut icon" href="tailor.png">

<meta name="theme-color" content="#007bff">
<title>Work App - Customers</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:15px; }
h2 { text-align:center; }

input {
    width:100%;
    padding:14px;
    font-size:18px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:14px;
    font-size:18px;
    margin:6px 0;
    border:none;
    border-radius:12px;
}

.searchBtn { background:#007bff; color:white; }
.addBtn { background:#28a745; color:white; }
.removeBtn { background:#dc3545; color:white; }

.entry {
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.add { background:#d4edda; }
.remove { background:#f8d7da; }

#custArea { margin-top:20px; }
</style>
</head>

<body>

<h2>Customer Ledger</h2>

<input id="search" placeholder="Phone or Name">

<button class="searchBtn" onclick="loadCustomer()">🔍 Search</button>

<div id="custArea"></div>

<!-- ✅ FIXED FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCaRF_Kpsjlpy4PbhB5wrEKjnTk34n9Me4",
  authDomain: "ashu-0143.firebaseapp.com",
  projectId: "ashu-0143"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ✅ AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== "ZcScdiPVf0VnjHsHZsRTrcMy8Y02") {
    window.location.href = "index.html";
  }
});

// LOCAL STORAGE
function getLocal() {
  return JSON.parse(localStorage.getItem("customers") || "{}");
}

function saveLocal(d) {
  localStorage.setItem("customers", JSON.stringify(d));
}

// 🔍 SEARCH
window.loadCustomer = async function() {
  let val = document.getElementById("search").value.trim();
  if (!val) return;

  let local = getLocal();
  let phone = val;
  let data = local[phone];

  // search by name
  if (!data) {
    let found = Object.keys(local).find(k =>
      local[k].name?.toLowerCase() === val.toLowerCase()
    );
    if (found) {
      phone = found;
      data = local[found];
    }
  }

  // fetch from firebase
  if (!data) {
    const snap = await getDoc(doc(db, "customers", val));
    if (snap.exists()) {
      data = snap.data();
      local[val] = data;
      saveLocal(local);
    }
  }

  // new customer
  if (!data) {
    let name = prompt("Enter Name:");
    if (!name) return;

    data = { name, history: [] };
    phone = val;

    local[phone] = data;
    saveLocal(local);
    await setDoc(doc(db, "customers", phone), data);
  }

  render(phone, data);
};

// 🧾 RENDER
function render(phone, data) {
  let total = 0;
  let html = "";

  data.history.forEach(h => {
    total += h.amount;
    html += `
      <div class="entry ${h.amount > 0 ? 'add' : 'remove'}">
        <span>${h.amount > 0 ? 'Received' : 'Pending'}</span>
        <span>₹${Math.abs(h.amount)}</span>
      </div>
    `;
  });

  document.getElementById("custArea").innerHTML = `
    <h3>${data.name}</h3>
    <h2 style="color:${total>=0?'green':'red'}">₹${total}</h2>

    <div style="max-height:200px; overflow:auto;">
      ${html || "No history"}
    </div>

    <input id="amount" type="number" placeholder="Amount">

    <button class="addBtn" onclick="update('${phone}',1)">➕ Received</button>
    <button class="removeBtn" onclick="update('${phone}',-1)">➖ Work Done</button>
  `;
}

// ➕ UPDATE
window.update = async function(phone, type) {
  let amt = parseInt(document.getElementById("amount").value);
  if (!amt) return;

  let local = getLocal();
  let d = local[phone];

  d.history.push({
    amount: type * amt,
    date: new Date().toISOString()
  });

  saveLocal(local);
  await setDoc(doc(db, "customers", phone), d);

  render(phone, d);
};
</script>

</body>
</html>
