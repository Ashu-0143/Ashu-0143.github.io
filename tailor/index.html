<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="images/tailor.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailor Dashboard</title>
  <style>
    :root { --primary: #667eea; --bg: #f8f9fa; --text: #2d3436; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
    .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
    .status-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); text-align: center; }
    .status-card .amt { font-size: 42px; font-weight: 800; color: var(--primary); margin: 8px 0; }
    .main-btn { width: 100%; padding: 20px; font-size: 18px; font-weight: 600; border: none; border-radius: 18px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.2s; }
    .main-btn:active { transform: scale(0.98); }
    .btn-daily { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-cust { background: linear-gradient(135deg, #009efd, #2af598); }
    .btn-summ { background: linear-gradient(135deg, #f5576c, #f093fb); }
    h1 { color: var(--text); margin-bottom: 10px; font-size: 24px; text-align: center; }
  </style>
</head>
<body>
<div class="container">
    <h1 id="welcome">Dashboard</h1>
    <div class="status-card">
        <h2>Today's Earnings</h2>
        <div class="amt" id="liveTotal">₹0</div>
        <small id="syncStatus">● Connected</small>
    </div>
    <button class="main-btn btn-daily" onclick="location.href='daily.html'">📋 Daily Work</button>
    <button class="main-btn btn-cust" onclick="location.href='customers.html'">👥 Customers</button>
    <button class="main-btn btn-summ" onclick="location.href='summary.html'">📊 Summary</button>
</div>

<script type="module">
// ✅ FIXED: Full Firebase Import Paths
import { initializeApp } from "https://gstatic.com";
import { getAuth, onAuthStateChanged } from "https://gstatic.com";
import { getFirestore, doc, onSnapshot, collection, getDocs, setDoc } from "https://gstatic.com";

const firebaseConfig = { 
    apiKey: "AIzaSyCaRF_Kpsjlpy4PbhB5wrEKjnTk34n9Me4", 
    authDomain: "ashu-0143.firebaseapp.com", 
    projectId: "ashu-0143" 
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🚚 MIGRATION LOGIC (Moves data from root to user-specific folder)
async function runMigration(user) {
    if (user.uid !== "ZcScdiPVf0VnjHsHZsRTrcMy8Y02") return;
    
    const collections = ["daily", "customers"];
    let migratedCount = 0;

    for (const colName of collections) {
        try {
            const snap = await getDocs(collection(db, colName));
            for (const record of snap.docs) {
                // Save to private path: users/UID/collection/ID
                await setDoc(doc(db, "users", user.uid, colName, record.id), record.data());
                migratedCount++;
            }
        } catch (e) { console.log("Migration check for " + colName + " skipped."); }
    }
    
    if(migratedCount > 0) alert("Migration Successful! Data moved to your private folder.");
}

onAuthStateChanged(auth, (user) => {
  if (!user) {
      location.href = "../index.html";
  } else {
    // Run migration only for admin
    runMigration(user);

    if(user.uid === "ZcScdiPVf0VnjHsHZsRTrcMy8Y02") document.getElementById("welcome").innerText = "Admin Dashboard";

    // Helper for Local Date (YYYY-MM-DD)
    const d = new Date();
    const today = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    
    // ✅ Real-time Listener for user-specific data
    onSnapshot(doc(db, "users", user.uid, "daily", today), (docSnap) => {
        if (docSnap.exists()) {
            document.getElementById("liveTotal").innerText = "₹" + (docSnap.data().total || 0);
        } else {
            document.getElementById("liveTotal").innerText = "₹0";
        }
    });
  }
});
</script>
</body>
</html>
